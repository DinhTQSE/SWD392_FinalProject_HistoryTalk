spring.application.name=history-talk-backend
spring.config.import=classpath:secretKey.properties
server.port=8080

spring.mvc.servlet.path=/Historical-tell

#config postgresql
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.schema=${DB_SCHEMA}
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG

# Flyway
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.schemas=${DB_SCHEMA}


# Config swagger

springdoc.api-docs.path=/api/v1/api-docs
springdoc.swagger-ui.path=/api/v1/swagger-ui
springdoc.swagger-ui.enabled=true
springdoc.enable-kotlin=false

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2