spring.application.name=history-talk-backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/history_talk_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

server.port=8080

jwt.secret=${JWT_SECRET:your_super_secret_key_change_this_in_production_make_it_at_least_256_bits_for_HS512}
jwt.expiration=86400000
jwt.refreshExpiration=604800000

logging.level.root=INFO
logging.level.com.historyTalk=DEBUG
logging.level.org.springframework.security=DEBUG

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
