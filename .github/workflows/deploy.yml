name: CI/CD Pipeline

on:
  push:
    branches: [ deployment ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.MY_PAT }}
      
      # Build Java
      - name: Build and Push Java
        uses: docker/build-push-action@v4
        with:
          context: ./Source-code/SWD392_FinalProject_HistoryTalk/history-talk-backend-Java
          file: ./Source-code/SWD392_FinalProject_HistoryTalk/history-talk-backend-Java/Dockerfile
          push: true
          tags: ghcr.io/dinhtqse/historytalk-java:latest

      # Build AI
      - name: Build and Push AI
        uses: docker/build-push-action@v4
        with:
          context: ./Source-code/SWD392_FinalProject_HistoryTalk/history-talk-backend-AI
          file: ./Source-code/SWD392_FinalProject_HistoryTalk/history-talk-backend-AI/Dockerfile
          push: true
          tags: ghcr.io/dinhtqse/historytalk-ai:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "${{ secrets.MY_PAT }}" | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f