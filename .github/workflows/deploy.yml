name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.MY_PAT }}
      
      # Build Java
      - name: Build and Push Java
        uses: docker/build-push-action@v4
        with:
          context: ./Source-code/SWD392_FinalProject_HistoryTalk/history-talk-backend-Java
          file: ./Source-code/SWD392_FinalProject_HistoryTalk/history-talk-backend-Java/Dockerfile
          push: true
          tags: ghcr.io/dinhtqse/historytalk-java:latest

      # Build AI
      - name: Build and Push AI
        uses: docker/build-push-action@v4
        with:
          context: ./Source-code/SWD392_FinalProject_HistoryTalk/history-talk-backend-AI
          file: ./Source-code/SWD392_FinalProject_HistoryTalk/history-talk-backend-AI/Dockerfile
          push: true
          tags: ghcr.io/dinhtqse/historytalk-ai:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          MY_PAT: ${{ secrets.MY_PAT }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_USERNAME,MY_PAT
          script: |
            # Đăng nhập GHCR trên server
            echo "$MY_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            # CẬP NHẬT CẤU HÌNH MỚI NHẤT TỪ GITHUB
            cd /home/ec2-user/SWD392_FinalProject_HistoryTalk/
            git pull origin main
           
            docker compose -f docker-compose.prod.yml pull
            
            # 2. Ép buộc tạo lại container ngay cả khi cấu hình không đổi
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            
            # 3. Dọn rác
            docker image prune -f