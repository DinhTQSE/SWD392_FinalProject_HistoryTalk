openapi: 3.0.0
info:
  title: History Talk API
  description: API for Historical Context Management in History Talk Educational Platform
  version: 1.0.0
  contact:
    name: History Talk Team

servers:
  - url: http://localhost:8080/api
    description: Local Development Server
  - url: https://api.historytalk.com
    description: Production Server

paths:
  /v1/historical-contexts:
    get:
      summary: Get all historical contexts (Paginated)
      description: Retrieve a paginated list of all historical contexts. Staff can see all contexts, guests/users see only published.
      operationId: getAllHistoricalContexts
      tags:
        - Historical Context
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Page number (0-indexed)
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 10
          description: Number of records per page
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: createdDate,desc
          description: Sort by field and direction (e.g., 'name,asc')
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search by context name or description
      responses:
        '200':
          description: Successfully retrieved historical contexts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Historical contexts retrieved successfully"
                  data:
                    type: object
                    properties:
                      content:
                        type: array
                        items:
                          $ref: '#/components/schemas/HistoricalContextResponse'
                      totalElements:
                        type: integer
                        example: 50
                      totalPages:
                        type: integer
                        example: 5
                      currentPage:
                        type: integer
                        example: 0
                      pageSize:
                        type: integer
                        example: 10
                        
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create a new historical context
      description: Create a new historical context. Only staff members can create contexts.
      operationId: createHistoricalContext
      tags:
        - Historical Context
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHistoricalContextRequest'
      responses:
        '201':
          description: Historical context created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Historical context created successfully"
                  data:
                    $ref: '#/components/schemas/HistoricalContextResponse'
                  timestamp:
                    type: string
                    format: date-time
                    
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          description: Conflict - Context name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/historical-contexts/{contextId}:
    get:
      summary: Get a historical context by ID
      description: Retrieve details of a specific historical context
      operationId: getHistoricalContextById
      tags:
        - Historical Context
      security:
        - BearerAuth: []
      parameters:
        - name: contextId
          in: path
          required: true
          schema:
            type: string
          description: Historical context ID
      responses:
        '200':
          description: Successfully retrieved historical context
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Historical context retrieved successfully"
                  data:
                    $ref: '#/components/schemas/HistoricalContextResponse'
                    
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Update a historical context
      description: Update an existing historical context. Only the creator staff or admins can update.
      operationId: updateHistoricalContext
      tags:
        - Historical Context
      security:
        - BearerAuth: []
      parameters:
        - name: contextId
          in: path
          required: true
          schema:
            type: string
          description: Historical context ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHistoricalContextRequest'
      responses:
        '200':
          description: Historical context updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Historical context updated successfully"
                  data:
                    $ref: '#/components/schemas/HistoricalContextResponse'
                    
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          description: Conflict - Context name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete a historical context
      description: Permanently delete a historical context. Only the creator or admins can delete.
      operationId: deleteHistoricalContext
      tags:
        - Historical Context
      security:
        - BearerAuth: []
      parameters:
        - name: contextId
          in: path
          required: true
          schema:
            type: string
          description: Historical context ID
      responses:
        '204':
          description: Historical context deleted successfully

        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    HistoricalContextResponse:
      type: object
      properties:
        contextId:
          type: string
          example: "ctx_001"
        name:
          type: string
          example: "Battle of Dien Bien Phu"
        description:
          type: string
          example: "A decisive battle in the First Indochina War..."
        createdBy:
          type: object
          properties:
            staffId:
              type: string
              example: "staff_001"
            name:
              type: string
              example: "John Doe"
        createdDate:
          type: string
          format: date-time
          example: "2025-01-23T10:30:00Z"
        updatedDate:
          type: string
          format: date-time
          example: "2025-01-25T14:45:00Z"

    CreateHistoricalContextRequest:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
          example: "Battle of Dien Bien Phu"
          description: Name of the historical context
        description:
          type: string
          minLength: 10
          maxLength: 5000
          example: "A decisive battle in the First Indochina War..."
          description: Detailed description of the historical context

    UpdateHistoricalContextRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
          example: "Battle of Dien Bien Phu"
          description: Name of the historical context
        description:
          type: string
          minLength: 10
          maxLength: 5000
          example: "A decisive battle in the First Indochina War..."
          description: Detailed description of the historical context

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "An error occurred"
        timestamp:
          type: string
          format: date-time
          example: "2025-01-25T14:45:00Z"
        errorCode:
          type: string
          example: "RESOURCE_NOT_FOUND"
        details:
          type: object
          properties:
            field:
              type: string
              example: "name"
            issue:
              type: string
              example: "must not be empty"

  responses:
    BadRequestError:
      description: Bad request - Validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: "Validation failed"
              errors:
                type: array
                items:
                  type: object
                  properties:
                    field:
                      type: string
                      example: "name"
                    message:
                      type: string
                      example: "must not be blank"

    UnauthorizedError:
      description: Unauthorized - Invalid or missing JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: "Unauthorized - Valid JWT token required"
            errorCode: "UNAUTHORIZED"

    ForbiddenError:
      description: Forbidden - User lacks required permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: "Forbidden - Only staff members can perform this action"
            errorCode: "FORBIDDEN"

    NotFoundError:
      description: Not found - Resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: "Historical context not found"
            errorCode: "RESOURCE_NOT_FOUND"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: "Internal server error"
            errorCode: "INTERNAL_SERVER_ERROR"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token. Format: "Bearer {token}"
